<div class="topbar-shell">
  <button class="menu-toggle" type="button" (click)="toggleMenu()" aria-label="Toggle menu">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <line x1="3" y1="6" x2="21" y2="6" />
      <line x1="3" y1="12" x2="21" y2="12" />
      <line x1="3" y1="18" x2="21" y2="18" />
    </svg>
  </button>

  <div class="topbar-spacer"></div>

  <button class="notification-btn" type="button" aria-label="Notifications">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M18 8a6 6 0 0 0-12 0c0 7-3 7-3 7h18s-3 0-3-7" />
      <path d="M13.73 21a2 2 0 0 1-3.46 0" />
    </svg>
    <span>6</span>
  </button>

  <div class="admin-chip" (click)="toggleAdminDropdown($event.currentTarget)">
    <div class="avatar">AD</div>
    <div>
      <strong>Admin User</strong>
      <span>Administrator</span>
    </div>
    <b>v</b>
  </div>
</div>

<!-- Admin dropdown flyout -->
<div
  class="admin-flyout"
  *ngIf="isDropdownOpen && flyoutPosition"
  [style.top.px]="flyoutPosition!.top"
  [style.left.px]="flyoutPosition!.left"
  (click)="$event.stopPropagation()"
>
  <div class="flyout-user-info">
    <div class="flyout-avatar">AD</div>
    <div class="flyout-user-details">
      <strong>Admin User</strong>
      <span>Administrator</span>
    </div>
  </div>
  <button type="button" class="flyout-item" (click)="logout()">Logout</button>
</div>
