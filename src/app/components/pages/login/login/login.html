<div class="login-shell">
  <aside class="branding-panel">
    <div class="brand-top">
      <div class="brand-mark">
        <img src="/PurpleIQ-white.png" alt="PurpleIQ Logo" />
      </div>
      <h1>Welcome to Assets 360</h1>
      <p class="brand-subtitle">TRACK. MANAGE. OPTIMIZE. PROTECT.</p>
    </div>

    <div class="brand-features">
      <div class="feature-item">Asset Tracking & Inventory</div>
      <div class="feature-item">Real-time Location</div>
      <div class="feature-item">Maintenance Scheduling</div>
      <div class="feature-item">Asset Lifecycle Management</div>
    </div>
  </aside>

  <section class="login-panel">
    <div class="login-card">
      <div class="icon-shell">
        <img src="/PurpleIQLOGOPurpleBright.png" alt="PurpleIQ Logo" />
        <img src="/PurpleIqNamePurple.png" alt="PurpleIQ Logo" />
      </div>
      
      <p class="login-subtitle">Sign in to Assets 360</p>

      <form (ngSubmit)="login()" method="post" class="login-form">
        <label class="field-label">
          <span>Username</span>
          <input
            type="email"
            [(ngModel)]="credentials.email"
            name="email"
            placeholder="Enter your username"
            autocomplete="username"
          />
        </label>

        <label class="field-label">
          <span>Password</span>
          <input
            type="password"
            [(ngModel)]="credentials.password"
            name="password"
            placeholder="Enter your password"
            autocomplete="current-password"
          />
        </label>

        <div class="login-meta">
          <label class="checkbox-label">
            <input type="checkbox" />
            Remember me
          </label>
          <a class="forgot-link" href="#">Forgot Password?</a>
        </div>

        <p *ngIf="errorMsg" class="error-msg">{{ errorMsg }}</p>

        <button type="submit" class="submit-button" [disabled]="isLoading">
          {{ isLoading ? 'Signing In...' : 'Sign In' }}
        </button>

        <div *ngIf="popupVisible" class="popup-overlay">
          <div class="popup-card" [class.error]="popupType === 'error'" [class.success]="popupType === 'success'">
            <div class="popup-header">
              <h3>{{ popupTitle }}</h3>
              <button type="button" class="popup-close" (click)="closePopup()">×</button>
            </div>
            <div class="popup-body">
              <p>{{ popupMessage }}</p>
            </div>
            <div class="popup-actions">
              <button type="button" class="btn-close" (click)="closePopup()">Close</button>
            </div>
          </div>
        </div>
      </form>

      <div class="secure-note">Secured &amp; Encrypted Connection</div>
    </div>
  </section>
</div>
