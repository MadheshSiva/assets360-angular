<section class="process-automation-page">
  <div class="process-automation-card">
    <header class="pa-header">
      <h2 class="pa-title">Process&amp;Automation</h2>

      <div class="pa-actions">
        <div class="pa-search">
          <input
            type="text"
            placeholder="Search"
            [(ngModel)]="searchTerm"
            aria-label="Search rules" />
          <svg class="pa-search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="7"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
        </div>

        <button type="button" class="pa-icon-btn" title="Add rule" (click)="navigateToAdd()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        </button>

        <button type="button" class="pa-icon-btn" title="Import rules (CSV)" (click)="triggerImport()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 19V6"></path><path d="M6 12l6-6 6 6"></path><path d="M5 21h14"></path></svg>
        </button>
        <input #fileInput type="file" accept=".csv" class="pa-hidden-input" (change)="handleFileSelected($event)" />

        <button type="button" class="pa-icon-btn" title="Export rules (CSV)" (click)="exportCsv()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v13"></path><path d="M6 12l6 6 6-6"></path><path d="M5 21h14"></path></svg>
        </button>

        <button type="button" class="pa-icon-btn" title="Refresh" (click)="refresh()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-2.64-6.36"></path><path d="M21 4v5h-5"></path></svg>
        </button>

        <button type="button" class="pa-icon-btn" title="Delete all" (click)="deleteAll()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18"></path><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
        </button>
      </div>
    </header>

    <div class="pa-table-wrapper">
      <table class="pa-table">
        <thead>
          <tr>
            <th>Rule Name</th>
            <th>Type</th>
            <th>Last Activated</th>
            <th>Created On</th>
            <th>Status</th>
            <th>Edit</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngIf="isAdding" class="pa-row pa-row-edit">
            <td><input type="text" placeholder="Rule name" [(ngModel)]="newRule.ruleName" /></td>
            <td>
              <select [(ngModel)]="newRule.type">
                <option value="Standard">Standard</option>
                <option value="Advanced">Advanced</option>
              </select>
            </td>
            <td class="pa-muted">{{ todayIso() }}</td>
            <td class="pa-muted">{{ todayIso() }}</td>
            <td>
              <select [(ngModel)]="newRule.status">
                <option value="Pending">Pending</option>
                <option value="Completed">Completed</option>
                <option value="Failed">Failed</option>
              </select>
            </td>
            <td class="pa-edit-cell">
              <button type="button" class="pa-mini-btn" title="Save" (click)="confirmAdd()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"></polyline></svg>
              </button>
              <button type="button" class="pa-mini-btn" title="Cancel" (click)="cancelAdd()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
              </button>
            </td>
          </tr>

          <tr *ngFor="let rule of filteredRules" class="pa-row">
            <ng-container *ngIf="editingId === rule.id; else viewRow">
              <td><input type="text" [(ngModel)]="editBuffer.ruleName" /></td>
              <td>
                <select [(ngModel)]="editBuffer.type">
                  <option value="Standard">Standard</option>
                  <option value="Advanced">Advanced</option>
                </select>
              </td>
              <td class="pa-muted">{{ rule.lastActivated }}</td>
              <td class="pa-muted">{{ rule.createdOn }}</td>
              <td>
                <select [(ngModel)]="editBuffer.status">
                  <option value="Pending">Pending</option>
                  <option value="Completed">Completed</option>
                  <option value="Failed">Failed</option>
                </select>
              </td>
              <td class="pa-edit-cell">
                <button type="button" class="pa-mini-btn" title="Save" (click)="confirmEdit()">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"></polyline></svg>
                </button>
                <button type="button" class="pa-mini-btn" title="Cancel" (click)="cancelEdit()">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
              </td>
            </ng-container>

            <ng-template #viewRow>
              <td>{{ rule.ruleName }}</td>
              <td>{{ rule.type }}</td>
              <td>{{ rule.lastActivated }}</td>
              <td>{{ rule.createdOn }}</td>
              <td>
                <span class="pa-status"
                  [class.pa-status-completed]="rule.status === 'Completed'"
                  [class.pa-status-pending]="rule.status === 'Pending'"
                  [class.pa-status-failed]="rule.status === 'Failed'">
                  {{ rule.status }}
                </span>
              </td>
              <td class="pa-edit-cell">
                <button type="button" class="pa-mini-btn" title="Edit" (click)="startEdit(rule)">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4h-7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                </button>
                <button type="button" class="pa-mini-btn" title="Delete" (click)="deleteRule(rule.id)">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18"></path><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"></path></svg>
                </button>
              </td>
            </ng-template>
          </tr>

          <tr *ngIf="filteredRules.length === 0 && !isAdding" class="pa-empty-row">
            <td colspan="6" class="pa-empty">No rules found.</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</section>
