<section class="role-page">
  <div class="role-card">
    <header class="role-header">
      <h2 class="role-title">Role Master</h2>

      <div class="role-search">
        <svg class="role-search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="7"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <input type="text" placeholder="Search Roles" [(ngModel)]="searchTerm" aria-label="Search roles" />
      </div>

      <div class="role-actions">
        <button type="button" class="role-icon-btn" title="Add Role" (click)="addRole()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
        </button>
        <button type="button" class="role-icon-btn" title="Export" (click)="exportRoles()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 3v12"></path>
            <path d="M7 10l5 5 5-5"></path>
            <path d="M5 21h14"></path>
          </svg>
        </button>
        <button type="button" class="role-icon-btn" title="Refresh" (click)="refresh()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12a9 9 0 1 1-2.64-6.36"></path>
            <path d="M21 4v5h-5"></path>
          </svg>
        </button>
      </div>
    </header>

    <div class="role-table-wrapper">
      <table class="role-table">
        <thead>
          <tr>
            <th>Role Id</th>
            <th>Role Name</th>
            <th>Description</th>
            <th>Access Permission</th>
            <th>ClientId</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let role of filteredRoles" class="role-row">
            <td>{{ role.roleId }}</td>
            <td>{{ role.roleName }}</td>
            <td>{{ role.description }}</td>
            <td>{{ summarize(role) }}</td>
            <td>{{ role.clientId }}</td>
            <td class="role-action-cell">
              <button type="button" class="role-mini-btn" title="Edit" (click)="editRole(role)">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M12 20h9"></path>
                  <path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"></path>
                </svg>
              </button>
              <button type="button" class="role-mini-btn" title="Delete" (click)="deleteRole(role.roleId)">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M3 6h18"></path>
                  <path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                  <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"></path>
                </svg>
              </button>
            </td>
          </tr>
          <tr *ngIf="filteredRoles.length === 0" class="role-empty-row">
            <td colspan="6" class="role-empty">No roles found.</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</section>
