<div class="user-page">
  <div class="card">

    <!-- Header -->
    <div class="card-header">
      <h2 class="title">User Master</h2>

      <div class="search-wrap">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="7"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <input
          type="text"
          class="search-input"
          placeholder="Search Users"
          [(ngModel)]="searchTerm"
          (ngModelChange)="onSearch()"
        />
      </div>

      <div class="header-actions">
        <button class="icon-btn" type="button" title="Add User" (click)="onAdd()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
        </button>
        <button class="icon-btn" type="button" title="Export" (click)="onExport()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 3v12"></path>
            <path d="M7 10l5 5 5-5"></path>
            <path d="M5 21h14"></path>
          </svg>
        </button>
        <button class="icon-btn" type="button" title="Refresh" (click)="onRefresh()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12a9 9 0 1 1-2.64-6.36"></path>
            <polyline points="21 3 21 9 15 9"></polyline>
          </svg>
        </button>
      </div>
    </div>

    <!-- Table -->
    <div class="table-wrap">
      <table class="user-table">
        <thead>
          <tr>
            <th>User Id</th>
            <th>User Name</th>
            <th>Short Name</th>
            <th>Contact No</th>
            <th>Email Id</th>
            <th>Role</th>
            <th>Role Name</th>
            <th>AD User Name</th>
            <th class="action-col">Action</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let user of filteredUsers; let i = index" [class.alt-row]="i % 2 === 1">
            <td>{{ user.userId }}</td>
            <td class="user-name">{{ user.userName }}</td>
            <td>{{ user.shortName }}</td>
            <td>{{ user.contactNo }}</td>
            <td>{{ user.emailId }}</td>
            <td>{{ user.role }}</td>
            <td>{{ user.roleName }}</td>
            <td>{{ user.adUserName }}</td>
            <td class="action-col">
              <button class="icon-btn small" type="button" title="Edit" (click)="onEdit(user)">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M11 4h-6a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-6"></path>
                  <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                </svg>
              </button>
              <button class="icon-btn small danger" type="button" title="Delete" (click)="onDelete(user)">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <polyline points="3 6 5 6 21 6"></polyline>
                  <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"></path>
                  <path d="M10 11v6"></path>
                  <path d="M14 11v6"></path>
                  <path d="M9 6V4a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v2"></path>
                </svg>
              </button>
            </td>
          </tr>

          <tr *ngIf="filteredUsers.length === 0">
            <td colspan="9" class="empty-row">No users match your search.</td>
          </tr>
        </tbody>
      </table>
  </div>

  <app-add-user-modal
    [visible]="showAddModal"
    [roleOptions]="['Admin','Manager','Staff','Doctor']"
    (save)="onUserSaved($event)"
    (cancel)="showAddModal = false"
  ></app-add-user-modal>

</div>
</div>
