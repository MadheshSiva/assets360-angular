<div class="modal-overlay" *ngIf="visible" (click)="onOverlayClick($event)">
  <div class="modal-card" (click)="$event.stopPropagation()">

    <!-- Header -->
    <div class="modal-header">
      <h3 class="modal-title">Add User</h3>
    </div>

    <!-- Body -->
    <div class="modal-body">
      <form #addUserForm="ngForm" novalidate>
        <div class="form-grid">

          <div class="form-field">
            <label for="userId">USER ID</label>
            <input
              id="userId"
              type="text"
              name="userId"
              placeholder="e.g. U006"
              [(ngModel)]="model.userId"
              required
            />
          </div>

          <div class="form-field">
            <label for="userName">USER NAME</label>
            <input
              id="userName"
              type="text"
              name="userName"
              placeholder="e.g. John Doe"
              [(ngModel)]="model.userName"
              required
            />
          </div>

          <div class="form-field">
            <label for="shortName">SHORT NAME</label>
            <input
              id="shortName"
              type="text"
              name="shortName"
              placeholder="e.g. JohnD"
              [(ngModel)]="model.shortName"
            />
          </div>

          <div class="form-field">
            <label for="contactNo">CONTACT NO</label>
            <input
              id="contactNo"
              type="text"
              name="contactNo"
              placeholder="+971 50 123 4567"
              [(ngModel)]="model.contactNo"
            />
          </div>

          <div class="form-field">
            <label for="emailId">EMAIL ID</label>
            <input
              id="emailId"
              type="email"
              name="emailId"
              placeholder="john@hospital.com"
              [(ngModel)]="model.emailId"
              required
            />
          </div>

          <div class="form-field">
            <label for="roleName">ROLE NAME</label>
            <div class="select-wrap">
              <select
                id="roleName"
                name="roleName"
                [(ngModel)]="model.roleName"
              >
                <option *ngFor="let role of roleOptions" [value]="role">{{ role }}</option>
              </select>
              <svg class="select-caret" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="6 9 12 15 18 9"></polyline>
              </svg>
            </div>
          </div>

          <div class="form-field">
            <label for="adUserName">ACTIVE DIRECTORY USER NAME</label>
            <input
              id="adUserName"
              type="text"
              name="adUserName"
              placeholder="e.g. john_ad"
              [(ngModel)]="model.adUserName"
            />
          </div>

        </div>
      </form>
    </div>

    <!-- Footer -->
    <div class="modal-footer">
      <button class="btn btn-secondary" type="button" (click)="onCancel()">Cancel</button>
      <button class="btn btn-primary" type="button" (click)="onSave()">Save User</button>
    </div>

  </div>
</div>
