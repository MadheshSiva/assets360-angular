<div class="lh-container">

  <!-- Header Row -->
  <div class="lh-header">
    <h1 class="lh-title">Assets - Asset Lifecycle</h1>

    <div class="icon-toolbar">
      <button class="icon-btn" title="Add" (click)="onAdd()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="12" y1="5" x2="12" y2="19"></line>
          <line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
      </button>
      <button class="icon-btn" title="Upload" (click)="onUpload()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 19V6"></path>
          <path d="M6 12l6-6 6 6"></path>
          <path d="M5 21h14"></path>
        </svg>
      </button>
      <button class="icon-btn" title="Download" (click)="onDownload()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 5v13"></path>
          <path d="M6 12l6 6 6-6"></path>
          <path d="M5 21h14"></path>
        </svg>
      </button>
      <button class="icon-btn" title="Refresh" (click)="onRefresh()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 12a9 9 0 1 1-2.64-6.36"></path>
          <path d="M21 4v5h-5"></path>
        </svg>
      </button>
      <button class="icon-btn" title="Delete" (click)="onDelete()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 6h18"></path>
          <path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
          <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"></path>
        </svg>
      </button>
    </div>
  </div>

  <!-- Table -->
  <div class="table-wrapper">
    <table class="lh-table">
      <thead>
        <tr>
          <th>Procurement Date</th>
          <th>Deployment Date</th>
          <th>Status</th>
          <th>Disposal Details</th>
          <th>Reason for Retirement</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let entry of entries">
          <td>{{ entry.procurementDate }}</td>
          <td>{{ entry.deploymentDate }}</td>
          <td>{{ entry.status }}</td>
          <td>{{ entry.disposalDetails }}</td>
          <td>{{ entry.reasonForRetirement }}</td>
        </tr>

        <tr *ngIf="entries.length === 0">
          <td colspan="5" class="empty-row">No asset lifecycle records found.</td>
        </tr>
      </tbody>
    </table>
  </div>

</div>
