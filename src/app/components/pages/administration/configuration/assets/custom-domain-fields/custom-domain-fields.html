<div class="lh-container">

  <!-- Header Row -->
  <div class="lh-header">
    <h1 class="lh-title">Assets - Custom / Domain-specific Asset Type Fields</h1>

    <div class="icon-toolbar">
      <button class="icon-btn" title="Add" (click)="onAdd()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="12" y1="5" x2="12" y2="19"></line>
          <line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
      </button>
      <button class="icon-btn" title="Upload" (click)="onUpload()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 19V6"></path>
          <path d="M6 12l6-6 6 6"></path>
          <path d="M5 21h14"></path>
        </svg>
      </button>
      <button class="icon-btn" title="Download" (click)="onDownload()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 5v13"></path>
          <path d="M6 12l6 6 6-6"></path>
          <path d="M5 21h14"></path>
        </svg>
      </button>
      <button class="icon-btn" title="Refresh" (click)="onRefresh()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 12a9 9 0 1 1-2.64-6.36"></path>
          <path d="M21 4v5h-5"></path>
        </svg>
      </button>
      <button class="icon-btn" title="Delete" (click)="onDelete()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 6h18"></path>
          <path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
          <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"></path>
        </svg>
      </button>
    </div>
  </div>

  <!-- Table -->
  <div class="table-wrapper">
    <table class="lh-table">
      <thead>
        <tr>
          <th>Asset Type</th>
          <th>Field Name</th>
          <th>Field Value</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let entry of entries">
          <td>
            <div class="select-wrap cell-select-wrap">
              <select class="cell-select" [(ngModel)]="entry.assetType" (ngModelChange)="onRowAssetTypeChange(entry)">
                <option *ngFor="let t of assetTypeOptions" [value]="t">{{ t }}</option>
              </select>
            </div>
          </td>
          <td>
            <div class="select-wrap cell-select-wrap">
              <select class="cell-select" [(ngModel)]="entry.fieldName">
                <option *ngFor="let f of fieldNameOptionsFor(entry.assetType)" [value]="f">{{ f }}</option>
              </select>
            </div>
          </td>
          <td>
            <input type="text" class="cell-input" placeholder="Enter value" [(ngModel)]="entry.fieldValue" />
          </td>
        </tr>

        <tr *ngIf="entries.length === 0">
          <td colspan="3" class="empty-row">No custom / domain-specific field records found.</td>
        </tr>
      </tbody>
    </table>
  </div>

</div>
