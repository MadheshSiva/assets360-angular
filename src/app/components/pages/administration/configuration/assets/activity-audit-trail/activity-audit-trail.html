<div class="lh-container">

  <!-- Header Row -->
  <div class="lh-header">
    <h1 class="lh-title">Assets - Activity / Audit Trail</h1>

    <div class="icon-toolbar">
      <button class="icon-btn" title="Download" (click)="onDownload()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 5v13"></path>
          <path d="M6 12l6 6 6-6"></path>
          <path d="M5 21h14"></path>
        </svg>
      </button>
      <button class="icon-btn" title="Refresh" (click)="onRefresh()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 12a9 9 0 1 1-2.64-6.36"></path>
          <path d="M21 4v5h-5"></path>
        </svg>
      </button>
      <button class="icon-btn" title="Delete" (click)="onDelete()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 6h18"></path>
          <path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
          <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"></path>
        </svg>
      </button>
    </div>
  </div>

  <!-- Table -->
  <div class="table-wrapper">
    <table class="lh-table">
      <thead>
        <tr>
          <th>Who Created / Updated Asset</th>
          <th>Changes Made (Field-level)</th>
          <th>Timestamp Logs</th>
          <th>Access Logs</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let entry of entries">
          <td class="system-cell">{{ entry.whoCreatedUpdatedAsset }}</td>
          <td class="system-cell">{{ entry.changesMade }}</td>
          <td class="system-cell">{{ entry.timestampLogs }}</td>
          <td class="system-cell">{{ entry.accessLogs }}</td>
        </tr>

        <tr *ngIf="entries.length === 0">
          <td colspan="4" class="empty-row">No activity / audit trail records found.</td>
        </tr>
      </tbody>
    </table>
  </div>

</div>
