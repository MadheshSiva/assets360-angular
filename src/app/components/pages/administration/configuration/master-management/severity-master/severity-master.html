<section class="wo-page">
  <div class="card">
    <div class="card-header">
      <h1 class="page-title">Master Management - Severity Master</h1>

      <div class="search-wrap">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/>
          <path d="M21 21L16.65 16.65" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <input
          type="text"
          class="search-input"
          placeholder="Search"
          [(ngModel)]="searchTerm"
          (ngModelChange)="onSearch()"
        />
      </div>

      <div class="header-actions">
        <button class="icon-btn" title="Edit selected" [disabled]="selectedRecords.length !== 1" (click)="onEdit()">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M16.5 3.5a2.12 2.12 0 013 3L7 19l-4 1 1-4L16.5 3.5z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>

        <button class="icon-btn" title="Create" (click)="onCreate()">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>

        <button class="icon-btn" title="Upload" (click)="onUpload()">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 19V5M6 11l6-6 6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>

        <button class="icon-btn" title="Download" (click)="onDownload()">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 5v14M6 13l6 6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>

        <button class="icon-btn" title="Delete selected" [disabled]="selectedRecords.length === 0" (click)="onDelete()">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M3 6h18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>

        <div class="column-picker-wrap">
          <button class="icon-btn" title="Choose columns" (click)="$event.stopPropagation(); toggleColumnPicker()">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect x="3" y="4" width="5" height="16" rx="1" stroke="currentColor" stroke-width="2"/>
              <rect x="9.5" y="4" width="5" height="16" rx="1" stroke="currentColor" stroke-width="2"/>
              <rect x="16" y="4" width="5" height="16" rx="1" stroke="currentColor" stroke-width="2"/>
            </svg>
          </button>

          <div class="column-picker-panel" *ngIf="showColumnPicker" (click)="$event.stopPropagation()">
            <div class="column-picker-title">Show columns</div>
            <label class="column-picker-item" *ngFor="let col of columns">
              <input type="checkbox" [checked]="col.visible" (change)="toggleColumn(col)" />
              <span>{{ col.label }}</span>
            </label>
          </div>
        </div>
      </div>
    </div>

    <div class="table-wrap">
      <table class="wo-table">
        <thead>
          <tr>
            <th class="selection-col">
              <input type="checkbox" [checked]="allSelected" (change)="toggleSelectAll()" />
            </th>
            <th *ngIf="isColumnVisible('severityId')">Severity ID</th>
            <th *ngIf="isColumnVisible('severityName')">Severity Name</th>
            <th *ngIf="isColumnVisible('colorCode')">Color Code</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let r of filteredRecords" [class.row-selected]="r.selected">
            <td class="selection-col">
              <input type="checkbox" [checked]="r.selected" (change)="toggleSelectRecord(r)" />
            </td>
            <td *ngIf="isColumnVisible('severityId')" class="mono">{{ r.severityId }}</td>
            <td *ngIf="isColumnVisible('severityName')">
              <span class="badge" [attr.data-priority]="r.severityName">{{ r.severityName }}</span>
            </td>
            <td *ngIf="isColumnVisible('colorCode')">
              <span class="color-swatch" [style.background]="r.colorCode"></span>
              {{ r.colorCode || '-' }}
            </td>
          </tr>

          <tr *ngIf="filteredRecords.length === 0">
            <td [attr.colspan]="columns.length + 1" class="empty-row">No records found.</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</section>

<div class="modal-overlay" *ngIf="showFormModal" (click)="closeFormModal()">
  <div class="modal" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <div class="modal-title-wrap">
        <span class="modal-icon">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="4" y="2" width="16" height="20" rx="1.5" stroke="currentColor" stroke-width="1.6"/>
            <rect x="7" y="5.5" width="2.2" height="2.2" fill="currentColor"/>
            <rect x="11" y="5.5" width="2.2" height="2.2" fill="currentColor"/>
            <rect x="15" y="5.5" width="2.2" height="2.2" fill="currentColor"/>
            <rect x="7" y="10" width="2.2" height="2.2" fill="currentColor"/>
            <rect x="11" y="10" width="2.2" height="2.2" fill="currentColor"/>
            <rect x="15" y="10" width="2.2" height="2.2" fill="currentColor"/>
          </svg>
        </span>
        <h2 class="modal-title">{{ isEditMode ? 'Edit Severity' : 'Create Severity' }}</h2>
      </div>
      <button class="modal-close" (click)="closeFormModal()" title="Close">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </button>
    </div>

    <form class="modal-form" (ngSubmit)="submitForm()" #recordForm="ngForm">
      <div class="form-grid">
        <div class="form-field">
          <label>SEVERITY ID</label>
          <input type="text" name="severityId" placeholder="Auto-generated if left blank" [(ngModel)]="form.severityId" [readonly]="isEditMode" />
        </div>

        <div class="form-field">
          <label>SEVERITY NAME <span class="required">*</span></label>
          <div class="select-wrap">
            <select name="severityName" [(ngModel)]="form.severityName" required>
              <option value="" disabled selected>-- Select Severity --</option>
              <option *ngFor="let s of severityNameMaster" [value]="s">{{ s }}</option>
            </select>
          </div>
        </div>

        <div class="form-field">
          <label>COLOR CODE</label>
          <div class="color-picker-wrap">
            <input type="color" name="colorCode" [(ngModel)]="form.colorCode" />
            <span>{{ form.colorCode || '-' }}</span>
          </div>
        </div>
      </div>

      <div class="modal-footer">
        <button type="button" class="btn btn-cancel" (click)="closeFormModal()">Cancel</button>
        <button type="submit" class="btn btn-submit" [disabled]="!recordForm.valid">
          {{ isEditMode ? 'Save Changes' : 'Create Severity' }}
        </button>
      </div>
    </form>
  </div>
</div>
