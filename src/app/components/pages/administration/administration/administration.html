<div class="admin-container">
  <app-breadcrumb [items]="breadcrumbItems" [dropdownOptions]="dropdownOptions"></app-breadcrumb>
  
  <ng-container *ngIf="showLanding">
    <h2 class="admin-title">Administration</h2>
    <nav class="admin-tabs">
      <a *ngFor="let opt of adminOptions" [routerLink]="opt.path" class="admin-tab">{{ opt.label }}</a>
    </nav>
  </ng-container>
  
  <router-outlet></router-outlet>
</div>
