<div class="cr-page">

  <!-- Breadcrumb -->
  <div class="cr-breadcrumb">
    <button type="button" class="cr-breadcrumb-link" (click)="navigateToReport()">Report</button>
    <span class="cr-breadcrumb-sep">&rsaquo;</span>
    <span class="cr-breadcrumb-current">Create Report</span>
  </div>

  <div class="cr-layout">

    <!-- ============ LEFT: LOCATION / PEOPLE TREE ============ -->
    <aside class="cr-sidebar">
      <div class="cr-search">
        <input
          type="text"
          placeholder="Search..."
          [(ngModel)]="searchTerm"
          name="search"
        />
        <svg class="cr-search-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/>
          <line x1="16.6" y1="16.6" x2="21" y2="21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </div>

      <ng-container *ngTemplateOutlet="treeList; context: { nodes: treeNodes, depth: 0 }"></ng-container>

      <ng-template #treeList let-nodes="nodes" let-depth="depth">
        <ul class="cr-tree" [style.--depth]="depth">
          <li *ngFor="let node of nodes">
            <button
              type="button"
              class="cr-tree-item"
              [class.cr-tree-item--active]="node.active"
              [class.cr-tree-item--leaf]="!node.children?.length"
              [style.paddingLeft.px]="16 + depth * 18"
              (click)="toggleNode(node)"
            >
              <span class="cr-tree-label">{{ node.label }}</span>
              <svg
                *ngIf="node.children?.length"
                class="cr-tree-chevron"
                [class.cr-tree-chevron--open]="node.expanded"
                viewBox="0 0 24 24"
                fill="none"
                aria-hidden="true"
              >
                <path d="M9 6l6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>

            <ng-container *ngIf="node.children?.length && node.expanded">
              <ng-container *ngTemplateOutlet="treeList; context: { nodes: node.children, depth: depth + 1 }"></ng-container>
            </ng-container>
          </li>
        </ul>
      </ng-template>
    </aside>

    <!-- ============ RIGHT: CREATE REPORT PANEL ============ -->
    <section class="cr-panel">

      <header class="cr-panel-header">
        <h1 class="cr-panel-title">New Reports</h1>

        <div class="cr-status-row">
          <span class="cr-status-label">
            Connection Status:
            <strong class="cr-status-value" [class.cr-status-value--offline]="!connectionStatus.online">
              {{ connectionStatus.online ? 'Online' : 'Offline' }}/{{ connectionStatus.online ? 'Offline' : 'Online' }}
            </strong>
          </span>

          <span class="cr-status-stat">TOTAL GATEWAY</span>
          <span class="cr-status-stat">FIXED SENSOR</span>
          <span class="cr-status-stat">MOBILE SENSOR (TRACKERS)</span>
          <span class="cr-status-stat">ALARMS &vert;&vert;</span>
        </div>
      </header>

      <hr class="cr-divider" />

      <div class="cr-section-row">
        <h2 class="cr-section-title">CREATE REPORTS</h2>

        <div class="cr-time-range">
          <span class="cr-time-range-label">Time Range :</span>

          <select
            class="cr-select cr-select--compact"
            [(ngModel)]="timeRangePreset"
            name="timeRangeMode"
            (ngModelChange)="selectTimeRange($event)"
          >
            <option value="custom">Custom</option>
          </select>

          <button
            type="button"
            *ngFor="let preset of timeRangePresets"
            class="cr-chip"
            [class.cr-chip--active]="timeRangePreset === preset.value"
            (click)="selectTimeRange(preset.value)"
          >
            {{ preset.label }}
          </button>
        </div>
      </div>

      <div class="cr-form-grid">

        <!-- LEFT COLUMN -->
        <div class="cr-form-col">

          <div class="cr-field">
            <label class="cr-label" for="reportName">Report Name</label>
            <input
              id="reportName"
              type="text"
              class="cr-input"
              placeholder="Report Name"
              [(ngModel)]="reportName"
              name="reportName"
            />
          </div>

          <div class="cr-field">
            <label class="cr-label">Select Module</label>
            <div class="cr-radio-list">
              <label class="cr-radio" *ngFor="let option of moduleOptions">
                <input
                  type="radio"
                  name="module"
                  [value]="option.value"
                  [(ngModel)]="selectedModule"
                />
                <span class="cr-radio-dot"></span>
                <span class="cr-radio-text">{{ option.label }}</span>
              </label>
            </div>
          </div>

          <div class="cr-field cr-field--template">
            <label class="cr-label" for="template">Select Template</label>
            <select
              id="template"
              class="cr-select"
              [(ngModel)]="selectedTemplate"
              name="template"
            >
              <option value="" disabled selected>Choose a template</option>
              <option *ngFor="let tpl of templateOptions" [value]="tpl">{{ tpl }}</option>
            </select>
          </div>

        </div>

        <!-- RIGHT COLUMN -->
        <div class="cr-form-col">

          <div class="cr-field">
            <label class="cr-label">Choose Format</label>
            <div class="cr-radio-list">
              <label class="cr-radio">
                <input type="radio" name="format" value="url" [(ngModel)]="format" />
                <span class="cr-radio-dot"></span>
                <span class="cr-radio-text">URL</span>
              </label>
              <label class="cr-radio">
                <input type="radio" name="format" value="pdf" [(ngModel)]="format" />
                <span class="cr-radio-dot"></span>
                <span class="cr-radio-text">PDF</span>
              </label>
              <label class="cr-radio">
                <input type="radio" name="format" value="csv" [(ngModel)]="format" />
                <span class="cr-radio-dot"></span>
                <span class="cr-radio-text">Also download raw data in CSV Format</span>
              </label>
            </div>
          </div>

          <div class="cr-field">
            <label class="cr-label">Recurrence of Report</label>
            <div class="cr-radio-list cr-radio-list--recurrence">

              <label class="cr-radio">
                <input type="radio" name="recurrence" value="once" [(ngModel)]="recurrence" />
                <span class="cr-radio-dot"></span>
                <span class="cr-radio-text">Once</span>
              </label>

              <label class="cr-radio cr-radio--row">
                <input type="radio" name="recurrence" value="daily" [(ngModel)]="recurrence" />
                <span class="cr-radio-dot"></span>
                <span class="cr-radio-text">Daily</span>
                <input
                  type="time"
                  class="cr-time-input"
                  [(ngModel)]="dailyTime"
                  name="dailyTime"
                  [disabled]="recurrence !== 'daily'"
                />
              </label>

              <label class="cr-radio cr-radio--row">
                <input type="radio" name="recurrence" value="weekly" [(ngModel)]="recurrence" />
                <span class="cr-radio-dot"></span>
                <span class="cr-radio-text">Weekly On</span>
                <select
                  class="cr-select cr-select--inline"
                  [(ngModel)]="weeklyDay"
                  name="weeklyDay"
                  [disabled]="recurrence !== 'weekly'"
                >
                  <option *ngFor="let day of weekDays" [value]="day">{{ day }}</option>
                </select>
                <span class="cr-inline-label">at</span>
                <input
                  type="time"
                  class="cr-time-input"
                  [(ngModel)]="weeklyTime"
                  name="weeklyTime"
                  [disabled]="recurrence !== 'weekly'"
                />
              </label>

              <label class="cr-radio cr-radio--row">
                <input type="radio" name="recurrence" value="monthly" [(ngModel)]="recurrence" />
                <span class="cr-radio-dot"></span>
                <span class="cr-radio-text">Monthly</span>
                <input
                  type="date"
                  class="cr-date-input"
                  [(ngModel)]="monthlyDate"
                  name="monthlyDate"
                  [disabled]="recurrence !== 'monthly'"
                />
                <span class="cr-inline-label">at</span>
                <input
                  type="time"
                  class="cr-time-input"
                  [(ngModel)]="monthlyTime"
                  name="monthlyTime"
                  [disabled]="recurrence !== 'monthly'"
                />
              </label>

            </div>
          </div>

          <div class="cr-field">
            <label class="cr-label" for="shareWith">Share With</label>
            <textarea
              id="shareWith"
              class="cr-textarea"
              placeholder="Enter Comma-Separated Email Addresses"
              [(ngModel)]="shareWith"
              name="shareWith"
              rows="5"
            ></textarea>
          </div>

        </div>
      </div>

      <div class="cr-actions">
        <button type="button" class="cr-btn cr-btn--ghost" (click)="onCancel()">Cancel</button>
        <button
          type="button"
          class="cr-btn cr-btn--primary"
          [disabled]="!isFormValid"
          (click)="onCreateReport()"
        >
          Create Report
        </button>
      </div>

    </section>
  </div>
</div>
